name: Daily Hugin Long-tail Aggregator

on:
  schedule:
    # Daily 04:30 UTC (11:30 WIB) — runs AFTER gsc-daily (which writes the
    # comprehensive query snapshots Hugin reads). Adjust if gsc-daily moves.
    - cron: '30 4 * * *'
  workflow_dispatch:

concurrency:
  group: hugin-aggregate
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger /api/cron/hugin-aggregate
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing APP_URL or CRON_SECRET secret"
            exit 1
          fi
          curl --fail-with-body --silent --show-error --max-time 420 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/hugin-aggregate"
