name: Daily Tech Escalation Digest

on:
  schedule:
    # Daily 02:00 UTC (09:00 WIB) — early enough that Asst Manager sees it
    # before sprint planning. Conservative: only fires when there ARE stale
    # items (route returns ok with no Slack post otherwise).
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: tech-escalation
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/tech-escalation
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET not set"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/tech-escalation")
          echo "Response:"
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
