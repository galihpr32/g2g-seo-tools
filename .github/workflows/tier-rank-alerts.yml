name: Daily Tier Rank Alerts

on:
  schedule:
    # Daily 02:00 UTC (09:00 WIB) — runs after the weekly Monday SERP refresh
    # so the freshest snapshot has been captured before alert evaluation.
    # Posts ONE consolidated Slack message covering both brands (G2G + OffGamers).
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: tier-rank-alerts
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/tier-rank-alerts
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET not set"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 90 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/tier-rank-alerts")
          echo "Response:"
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
