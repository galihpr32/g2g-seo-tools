name: Daily Opportunities Auto-Snooze

on:
  schedule:
    # Every day at 02:00 UTC (09:00 WIB) — runs before the team starts triage
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: opportunities-snooze
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/opportunities-snooze
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/opportunities-snooze" | jq . 2>/dev/null || true
