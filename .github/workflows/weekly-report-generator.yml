name: Weekly Report Generator

# Runs every Monday at 01:00 UTC (= 08:00 WIB) — generates the report
# for the most recently completed Thursday→Wednesday window. The Monday
# timing gives GSC ~3 days of data settle after the Wednesday cutoff.

on:
  schedule:
    - cron: '0 1 * * 1'   # Monday 01:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab

concurrency:
  group: weekly-report-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron/weekly-report-generator
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET secret not set in repo settings"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 480 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/weekly-report-generator")
          echo "Response:"
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
