name: Product Content Auto-Process (DISABLED)

# DISABLED 2026-05-12: Product Content moved to a manual-trigger sheet-as-database
# flow. The "Create now?" column in the Google Sheet is now the trigger; Galih
# clicks "Run All Pending" in the UI when ready. Auto-cron no longer runs.
# Keeping the file with workflow_dispatch only so it can be re-enabled by
# restoring the schedule block if we ever revert.

on:
  workflow_dispatch:

concurrency:
  group: product-content-auto
  # Cancel in progress: a fresh tick should not pile up if the previous
  # run is still working. The cron route is idempotent — picking up
  # 'generating' rows that get stuck is handled by recoverStuckRows().
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Trigger /api/cron/product-content-auto
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET not set"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 320 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/product-content-auto")
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
