name: Monthly Report Generator

# Runs on the 4th of each month at 01:00 UTC (= 08:00 WIB).
# The 4th-of-month timing gives GSC + GA4 a few extra days of catch-up
# before generating the previous month's report.

on:
  schedule:
    - cron: '0 1 4 * *'   # 4th @ 01:00 UTC
  workflow_dispatch:        # manual trigger

concurrency:
  group: monthly-report-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron/monthly-report-generator
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET secret not set in repo settings"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 480 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/monthly-report-generator")
          echo "Response:"
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
