name: Daily Brief Outcomes Auto-Classify

on:
  schedule:
    # Every day at 02:30 UTC (09:30 WIB) — runs after the snapshot cron at 02:00
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: brief-outcomes-classify
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/brief-outcomes-classify
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --silent --show-error --fail-with-body \
            --max-time 120 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/brief-outcomes-classify" | jq . 2>/dev/null || true
