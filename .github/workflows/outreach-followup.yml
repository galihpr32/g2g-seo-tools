name: Daily Outreach Follow-up Flag

on:
  schedule:
    # Every day at 06:00 UTC (13:00 WIB) — afternoon flag so Specialist 2
    # sees the queue first thing the next day.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: outreach-followup
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/outreach-followup
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/outreach-followup" | jq . 2>/dev/null || true
