name: Weekly Schema Health Check

on:
  schedule:
    # Sundays 04:00 UTC (11:00 WIB) — quiet time, doesn't compete with daily crons
    - cron: '0 4 * * 0'
  workflow_dispatch:

concurrency:
  group: schema-health
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron/schema-health
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET not set"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 360 \
            --request GET \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/schema-health")
          echo "Response:"
          echo "${response}" | jq . 2>/dev/null || echo "${response}"
